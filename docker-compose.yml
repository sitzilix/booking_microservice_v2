version: "3.9"

services:
  # --- ОСНОВНЫЕ СЕРВИСЫ ---
  book-service:
    build: ./book-service
    ports:
      - "8001:8000"
    env_file:
      - ./book-service/.env
    depends_on:
      - db
      - kafka
      - redis

  auth-service:
    build: ./auth-service
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis

  notification-service:
    build: ./notification-service
    depends_on:
      - kafka

  # --- ИНФРАСТРУКТУРА ---
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Kafka требует Zookeeper для управления состоянием
  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

volumes:
  db_data: